<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedGPT - Video Generator</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="theme-video">
    <!-- Animated background -->
    <div class="bg-mesh fixed-bg"></div>

    <div class="app-container">
      <nav class="top-nav">
        <div class="brand">✨ MedGPT</div>
        <div class="nav-links">
          <a href="/index.html">Chat</a>
          <a href="/features.html">Features</a>
          <a href="/video-gen.html" class="nav-video-gen">Video Gen</a>
          <a href="/login.html">Logout</a>
        </div>
      </nav>

      <main class="chat-area" style="padding-top: 2rem;">
        <div class="glass-card full-width-card" style="max-width: 800px; margin: 0 auto;">
          <h2>🎬 Video Generator</h2>
          <p style="color: #a1a1aa; margin-bottom: 2rem;">Turn a medical topic into an Instagram Reel script, voiceover, and video.</p>
          
          <form id="video-gen-form">
            <div class="input-group">
              <label for="topic">Reel Topic</label>
              <input type="text" id="topic" class="auth-input" placeholder="e.g., Why does diabetes cause nerve damage?" required />
            </div>

            <div style="display: flex; gap: 1rem;">
              <div class="input-group" style="flex: 1;">
                <label for="style">Video Style</label>
                <select id="style" class="auth-input">
                  <option value="educational">Educational</option>
                  <option value="storytelling">Storytelling</option>
                  <option value="myth_busting">Myth Busting</option>
                  <option value="quick_facts">Quick Facts</option>
                  <option value="exam_prep">Exam Prep</option>
                </select>
              </div>
              <div class="input-group" style="flex: 1;">
                <label for="voice">Voice</label>
                <select id="voice" class="auth-input">
                  <option value="male_professional">Male Professional</option>
                  <option value="male_energetic">Male Energetic</option>
                  <option value="female_warm">Female Warm</option>
                </select>
              </div>
              <div class="input-group" style="flex: 1;">
                <label for="duration">Target Duration</label>
                <select id="duration" class="auth-input">
                  <option value="30">30 seconds</option>
                  <option value="45">45 seconds</option>
                  <option value="60" selected>60 seconds</option>
                  <option value="75">75 seconds</option>
                  <option value="90">90 seconds</option>
                </select>
              </div>
            </div>

            <div class="input-group">
              <label for="context">Custom Context (Optional)</label>
              <textarea id="context" class="auth-input" rows="4" placeholder="Paste relevant text from your textbook here, or leave blank to auto-retrieve context."></textarea>
            </div>

            <button type="submit" class="primary-btn" id="generate-btn">Generate Reel</button>
          </form>

          <div id="loader" style="display: none; text-align: center; margin-top: 2rem;">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: #a1a1aa;" id="loader-text">Building your video... this can take ~60 seconds.</p>
          </div>

          <div id="result-container" style="display: none; margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem;">
            <h3 style="color: #10b981; margin-bottom: 1.5rem;">Your Reel is Ready!</h3>
            
            <video id="output-video" controls style="width: 100%; border-radius: 12px; margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.1);"></video>

            <div style="background: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
              <h4 id="script-title" style="margin-bottom: 1rem; color: #fff;"></h4>
              <p style="color: #e4e4e7; margin-bottom: 1rem;"><strong>Caption:</strong> <span id="script-caption"></span></p>
              <p style="color: #34d399; font-size: 0.9rem;" id="script-hashtags"></p>
            </div>
          </div>

        </div>
      </main>
    </div>

    <script type="module" src="/src/video-gen.js"></script>
  </body>
</html>
